              <div>
                <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:4px;">Số tiền nộp trước (quỹ dự phòng/tháng sau):</label>
                <input class="bc-input" type="number" id="r2-prepaid" value="${p.prepaid||0}" min="${p.prepaid||0}" placeholder="Số tiền nộp trước" />
              </div>
              <div>
                <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:4px;">Ghi chú chuyển khoản:</label>
                <input class="bc-input" id="r2-note" placeholder="Nhập ghi chú chuyển khoản..." />
              </div>
              <button class="bc-btn" id="r2-submit-request-btn">Gửi yêu cầu xác nhận chuyển tiền</button>
              <div id="r2-submit-msg" style="font-size:12px; margin-top:4px;"></div>
            </div>
          </div>
        </div>
      </div>`);
      
      const isPrivileged = canManage() || isOwner();
      const visibleRequests = (state.paymentRequests || []).filter(r => {
        if (r.month !== month) return false;
        return isPrivileged || r.memberId === myMember.id;
      });
      if (visibleRequests.length > 0) {
        const histCard = el(`<div class="bc-card" style="margin-top:0.75rem;">
          <h4 style="font-size:14px; color:#1B4332; margin-bottom:8px;">Lịch sử yêu cầu thanh toán ${monthLabel(month)}</h4>
          <div style="overflow-x:auto;">
            <table style="width:100%; font-size:12px; border-collapse:collapse; min-width:320px;">
              <tr style="color:#8a877d; text-align:left;">
                <th style="padding:4px 2px; font-weight:500;">Ngày</th>
                <th style="padding:4px 2px; font-weight:500;">Người gửi</th>
                <th style="padding:4px 2px; font-weight:500; text-align:right;">Đã nộp</th>
                <th style="padding:4px 2px; font-weight:500; text-align:center;">Người xác nhận</th>
                <th style="padding:4px 2px; font-weight:500; text-align:right;">Trạng thái</th>
              </tr>
            </table>
          </div>
        </div>`);
        const histTable = histCard.querySelector('table');
        visibleRequests.slice().reverse().forEach(r => {
          const statusColors = { pending: ['#FAEEDA','#854F0B', 'Chờ duyệt'], approved: ['#EAF3DE','#27500A', 'Đã duyệt'], rejected: ['#FAECE7','#993C1D', 'Từ chối'] };
          const [bg, fg, label] = statusColors[r.status] || ['#F1EFE8','#444441', r.status];
          const verifier = r.approvedBy ? escapeHtml(r.approvedBy) : '—';
          histTable.appendChild(el(`<tr style="border-top:1px solid #F1EFE8;">
            <td style="padding:6px 2px; color:#8a877d; white-space:nowrap;">${formatDate(r.date)}</td>
            <td style="padding:6px 2px; font-weight:500; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(r.memberName)}</td>
            <td style="padding:6px 2px; text-align:right; font-weight:600; color:#1B4332;">${formatVND(r.paid)}</td>
            <td style="padding:6px 2px; text-align:center; color:#6b7a73; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${verifier}</td>
            <td style="padding:6px 2px; text-align:right;"><span class="bc-badge" style="background:${bg}; color:${fg}; padding:2px 6px; font-size:10px;">${label}</span></td>
          </tr>`));
        });
        paymentSection.appendChild(histCard);
      }
      
      wrap.appendChild(paymentSection);
      
      setTimeout(() => {
        const btnQr = document.getElementById('r2-pay-qr-btn');
        const panelQr = document.getElementById('r2-qr-panel');
        if (btnQr) btnQr.onclick = () => {
          const isHidden = panelQr.style.display === 'none';
          panelQr.style.display = isHidden ? 'block' : 'none';
          btnQr.textContent = isHidden ? 'Ẩn thông tin nộp tiền' : 'Nộp tiền & Lấy mã QR';
          if (isHidden) {
            const r2PaidInput = document.getElementById('r2-paid');
            if (r2PaidInput) {
              r2PaidInput.value = (p.paid || 0) + Math.max(0, remaining);
            }
            const r2NoteInput = document.getElementById('r2-note');
            if (r2NoteInput) {
              r2NoteInput.value = [myMember.name, myMember.phone || '', monthLabel(month).replace(/^Th/, '')].filter(Boolean).join(' - ');
            }
          }
        };
        
        const submitBtn = document.getElementById('r2-submit-request-btn');
        if (submitBtn) submitBtn.onclick = () => {
          const r2Paid = parseFloat(document.getElementById('r2-paid').value) || 0;
          const r2Prepaid = parseFloat(document.getElementById('r2-prepaid').value) || 0;
          const note = document.getElementById('r2-note').value.trim();
          const msg = document.getElementById('r2-submit-msg');
          
          if (r2Paid < (p.paid || 0)) {
            msg.style.color = '#993C1D';
            msg.textContent = `Số tiền nộp không được nhỏ hơn số tiền đã xác nhận hiện tại (${formatVND(p.paid)}).`;
            return;
          }
          if (r2Prepaid < (p.prepaid || 0)) {
            msg.style.color = '#993C1D';
            msg.textContent = `Số tiền điều chỉnh không được nhỏ hơn số tiền đã xác nhận hiện tại (${formatVND(p.prepaid)}).`;
            return;
          }
          
          msg.textContent = '';
          const transferAmount = Math.max(0, (r2Paid - (p.paid || 0)) + (r2Prepaid - (p.prepaid || 0)));
          
          showPaymentQrDialog(transferAmount, note, async () => {
            showLoading('Đang gửi yêu cầu xác nhận chuyển tiền...');
            const ok = await mutatePaymentRequests(latest => {
              const list = Array.isArray(latest) ? latest : [];
              const newRequest = {
                id: uid(),
                memberId: myMember.id,
                memberName: myMember.name,
                month,
                paid: r2Paid,
                prepaid: r2Prepaid,
                status: 'pending',
                note,
                date: today
              };
              return list.concat([newRequest]);
            });
            hideLoading();
            if (ok) {
              alert('Gửi yêu cầu chuyển tiền thành công! Vui lòng đợi Admin phê duyệt.');
            } else {
              alert('Có lỗi xảy ra khi gửi yêu cầu, vui lòng thử lại.');
            }
            render();
          });
        };
      }, 0);
    }

    // --- Donate ---
    wrap.appendChild(el(`<h3 style="font-size:15px; color:#1B4332; margin:1.25rem 0 8px;">Donate công khai · ${monthLabel(month)}</h3>`));
    const monthDonations = (state.donations||[]).filter(d => d.month === month);
    if (canManage()) {
      const donateForm = el(`<div class="bc-card">
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <select class="bc-select" id="don-member" style="flex:2; min-width:140px;">
            <option value="">Chọn thành viên donate...</option>
            ${state.members.map(m => `<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('')}
          </select>
          <input class="bc-input" type="number" min="0" id="don-amount" placeholder="Số tiền donate" style="flex:1; min-width:110px;" />
          <input class="bc-input" type="date" id="don-date" value="${today}" style="flex:1; min-width:130px;" />
          <input class="bc-input" id="don-note" placeholder="Ghi chú (tuỳ chọn)" style="flex:2; min-width:130px;" />
          <button class="bc-btn" id="don-add">Thêm</button>
        </div>
      </div>`);
      wrap.appendChild(donateForm);
      setTimeout(() => {
        document.getElementById('don-add').onclick = async () => {
          const mid = document.getElementById('don-member').value;
          const amount = parseFloat(document.getElementById('don-amount').value) || 0;
          const date = document.getElementById('don-date').value || today;
          const note = document.getElementById('don-note').value.trim();
          if (!mid || !amount) return;
          const mem = state.members.find(x => x.id === mid);
          await mutateDonations(latest => latest.concat([{ id: uid(), memberId: mid, memberName: mem ? mem.name : '?', amount, date, note, month }]));
          render();
        };
      }, 0);
    }
    if (monthDonations.length === 0) {
      wrap.appendChild(el(`<div style="font-size:13px; color:#8a877d; margin-bottom:1rem;">Chưa có ai donate tháng này.</div>`));
    } else {
      const donList = el(`<div class="bc-card" style="margin-bottom:1rem;"></div>`);
      monthDonations.forEach(d => {
        const row = el(`<div style="display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-top:1px solid #F1EFE8; font-size:13px;">
          <span>🎁 <strong>${escapeHtml(d.memberName)}</strong>${d.note ? ' · ' + escapeHtml(d.note) : ''} <span style="color:#8a877d;">(${d.date||''})</span></span>
          <span style="display:flex; align-items:center; gap:8px;">
            <strong style="color:#27500A;">+${formatVND(d.amount)}</strong>
            ${canDelete() ? `<button class="bc-btn danger small" data-did="${d.id}">Xoá</button>` : ''}
          </span>
        </div>`);
        if (canDelete()) row.querySelector('button').onclick = async () => {
          if (!confirm(`Bạn có chắc chắn muốn xóa khoản donate của ${d.memberName} số tiền ${formatVND(d.amount)}?`)) return;
          await mutateDonations(latest => latest.filter(x => x.id !== d.id));
          render();
        };
        donList.appendChild(row);
      });
      wrap.appendChild(donList);
    }

    // --- Quỹ nhóm ---
    wrap.appendChild(el(`<h3 style="font-size:15px; color:#1B4332; margin:1.25rem 0 8px;">Quỹ nhóm · ${monthLabel(month)}</h3>`));
    const f = state.fund[month] || { opening: 0, expenses: [] };
    const closing = fundClosing(month);
    if (canManage()) {
      const earliest = getEarliestActiveMonth();
      const isEarliest = !earliest || month <= earliest;
      const currentOpening = closing.opening;

      const openingCard = el(`<div class="bc-card" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
        <span style="font-size:13px; color:#6b7a73;">Tồn đầu tháng:</span>
        <input class="bc-input" type="number" id="fund-opening" value="${Math.round(currentOpening)}" style="width:140px; padding:5px 8px;" ${!isEarliest ? 'disabled' : ''} />
        ${isEarliest ? `
          <button class="bc-btn outline small" id="fund-carry">Lấy tồn cuối tháng trước</button>
          <button class="bc-btn small" id="fund-opening-save">Lưu</button>
        ` : `
          <span style="font-size:12px; color:#40916C; font-weight:600;">(Tự động kết chuyển từ tồn cuối tháng trước)</span>
        `}
      </div>`);
      wrap.appendChild(openingCard);
      const expForm = el(`<div class="bc-card">
        <h4 style="font-size:14px; margin-bottom:8px; color:#1B4332;">Thêm khoản chi</h4>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <select class="bc-select" id="exp-cat" style="flex:1; min-width:120px;">
            <option>Tiền sân</option><option>Tiền nước</option><option>Tiền bóng</option><option>Liên hoan</option><option>Khác</option>
          </select>
          <input class="bc-input" id="exp-label" placeholder="Ghi chú" style="flex:2; min-width:140px;" />
          <input class="bc-input" type="number" min="0" id="exp-amount" placeholder="Số tiền" style="flex:1; min-width:100px;" />
          <input class="bc-input" type="date" id="exp-date" value="${today}" style="flex:1; min-width:130px;" />
          <button class="bc-btn" id="exp-add">Thêm</button>
        </div>
      </div>`);
      wrap.appendChild(expForm);
      setTimeout(() => {
        if (isEarliest) {
          const carryBtn = document.getElementById('fund-carry');
          if (carryBtn) carryBtn.onclick = () => {
            document.getElementById('fund-opening').value = Math.round(fundClosing(prevMonthKey(month)).closing);
          };
          const saveBtn = document.getElementById('fund-opening-save');
          if (saveBtn) saveBtn.onclick = async () => {
            const val = parseFloat(document.getElementById('fund-opening').value) || 0;
            await mutateFund(latest => {
              const updated = Object.assign({}, latest);
              updated[month] = Object.assign({}, updated[month] || { expenses: [] }, { opening: val });
              return updated;
            });
            render();
          };
        }
      }, 0);
      setTimeout(() => {
        document.getElementById('exp-add').onclick = async () => {
          const category = document.getElementById('exp-cat').value;
          const label = document.getElementById('exp-label').value.trim();
          const amount = parseFloat(document.getElementById('exp-amount').value) || 0;
          const date = document.getElementById('exp-date').value || today;
          if (!amount) return;
          await mutateFund(latest => {
            const updated = Object.assign({}, latest);
            const cur = updated[month] || { opening: 0, expenses: [] };
            updated[month] = Object.assign({}, cur, { expenses: (cur.expenses||[]).concat([{ id: uid(), category, label, amount, date }]) });
            return updated;
          });
          render();
        };
      }, 0);
    }

    // --- Sổ thu/chi ---
    const ledgerEntries = [];
    state.members.forEach(m => {
      const p = (state.payments[m.id] || {})[month] || {};
      
      let payDate = p.date;
      if (!payDate) {
        const approvedReq = (state.paymentRequests || []).find(r => r.memberId === m.id && r.month === month && r.status === 'approved');
        if (approvedReq) {
          payDate = approvedReq.date;
        }
      }
      if (!payDate) {
        payDate = month + '-01';
      }

      if (p.paid) ledgerEntries.push({ date: payDate, type: 'income', label: 'Thu tiền nộp: ' + m.name, amount: p.paid });
      if (p.prepaid) {
        if (p.prepaid > 0) {
          ledgerEntries.push({ date: payDate, type: 'income_adj_plus', label: 'Điều chỉnh tăng: ' + m.name, amount: p.prepaid });
        } else if (p.prepaid < 0) {
          ledgerEntries.push({ date: payDate, type: 'income_adj_minus', label: 'Điều chỉnh giảm: ' + m.name, amount: Math.abs(p.prepaid) });
        }
      }
    });
    monthDonations.forEach(d => ledgerEntries.push({ date: d.date||month+'-01', type: 'income', label: 'Donate: ' + d.memberName + (d.note?' ('+d.note+')':''), amount: d.amount }));
    (f.expenses||[]).forEach(e => ledgerEntries.push({ date: e.date||month+'-01', type: 'expense', label: e.category + (e.label?' · '+e.label:''), amount: e.amount }));
    ledgerEntries.sort((a,b) => a.date.localeCompare(b.date));

    if (ledgerEntries.length) {
      const ledger = el(`<div class="bc-card"><div style="font-size:13px; font-weight:500; color:#1B4332; margin-bottom:6px;">Sổ thu/chi tháng ${monthLabel(month)}</div></div>`);
      const ltbl = el(`<table style="width:100%; font-size:13px; border-collapse:collapse;"><tr style="color:#8a877d; font-size:12px;"><th style="padding:4px; text-align:left;">Ngày</th><th style="padding:4px; text-align:left;">Nội dung</th><th style="padding:4px; text-align:right;">Số tiền</th></tr></table>`);
      ledgerEntries.forEach(e => {
        let prefix = '';
        let color = '#222';
        if (e.type === 'income' || e.type === 'income_adj_plus') {
          prefix = '+';
          color = '#222';
        } else if (e.type === 'expense' || e.type === 'income_adj_minus') {
          prefix = '-';
          color = '#993C1D';
        }
        ltbl.appendChild(el(`<tr style="border-top:1px solid #F1EFE8;">
          <td style="padding:5px 4px; color:#8a877d; white-space:nowrap;">${formatDate(e.date)}</td>
          <td style="padding:5px 4px;">${escapeHtml(e.label)}</td>
          <td style="padding:5px 4px; text-align:right; font-weight:500; color:${color};">${prefix}${formatVND(e.amount)}</td>
        </tr>`));
      });
      ledger.appendChild(ltbl);
      wrap.appendChild(ledger);
    }

    if ((f.expenses||[]).length) {
      const expList = el(`<div class="bc-card"><div style="font-size:13px; font-weight:500; color:#1B4332; margin-bottom:6px;">Khoản chi trong tháng</div></div>`);
      (f.expenses||[]).forEach(e => {
        const row = el(`<div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-top:1px solid #F1EFE8; font-size:13px;">
          <span>${e.date?`<span style="color:#8a877d;">${formatDate(e.date)} · </span>`:''}${escapeHtml(e.category)}${e.label?' · '+escapeHtml(e.label):''}</span>
          <span style="display:flex; align-items:center; gap:8px;">
            <strong style="color:#993C1D;">-${formatVND(e.amount)}</strong>
            ${canDelete()?`<button class="bc-btn danger small" data-id="${e.id}">Xoá</button>`:''}
          </span>
        </div>`);
        if (canDelete()) row.querySelector('button').onclick = async () => {
          const expenseDesc = e.category + (e.label ? ' - ' + e.label : '');
          if (!confirm(`Bạn có chắc chắn muốn xóa khoản chi "${expenseDesc}" số tiền ${formatVND(e.amount)}?`)) return;
          await mutateFund(latest => {
            const updated = Object.assign({}, latest);
            const cur = updated[month] || { opening: 0, expenses: [] };
            updated[month] = Object.assign({}, cur, { expenses: (cur.expenses||[]).filter(x => x.id !== e.id) });
            return updated;
          });
          render();
        };
        expList.appendChild(row);
      });
      wrap.appendChild(expList);
    }

    if (role() !== 'r2') {
      wrap.appendChild(el(`<div class="bc-card" style="background:#F4F1EA; font-size:13px;">
        <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:baseline;">
          <span style="color:#6b7a73;">Tồn đầu: <strong style="color:#1B4332;">${formatVND(closing.opening)}</strong></span>
          <span style="color:#6b7a73;">Thu nộp: <strong style="color:#222;">+${formatVND(closing.incomePaid)}</strong></span>
          <span style="color:#6b7a73;">Nộp trước/ĐC: <strong style="color:#222;">${formatVND(closing.incomePrepaid, true)}</strong></span>
          <span style="color:#6b7a73;">Donate: <strong style="color:#222;">+${formatVND(closing.incomeDonate)}</strong></span>
          <span style="color:#6b7a73;">Chi: <strong style="color:#993C1D;">-${formatVND(closing.expenseTotal)}</strong></span>
          <span style="color:#6b7a73; font-size:14px;">Tồn cuối: <strong style="color:#1B4332; font-size:15px;">${formatVND(closing.closing)}</strong></span>
        </div>
      </div>`));

      const diffOk = Math.abs(closing.diff) < 1;
      wrap.appendChild(el(`<div class="bc-card" style="background:${diffOk?'#EAF3DE':'#FAECE7'}; font-size:13px; color:${diffOk?'#27500A':'#993C1D'};">
        <div style="font-weight:500; margin-bottom:6px;">📊 Đối chiếu chi phí buổi tập vs quỹ · ${monthLabel(month)}</div>
        <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:4px;">
          <span>Chi phí ghi trong quỹ: <strong>-${formatVND(closing.expenseTotal)}</strong></span>
          <span>Chi phí tính từ buổi tập: <strong>-${formatVND(closing.sessionsCostTotal)}</strong></span>
          <span>Chênh lệch: <strong>${closing.diff>=0?'+':''}${formatVND(closing.diff)}</strong></span>
        </div>
        <div>${diffOk ? '✅ Khớp — chi phí quỹ đúng với tổng buổi tập.' : '⚠️ Lệch ' + formatVND(Math.abs(closing.diff)) + ' — kiểm tra lại khoản chi trong quỹ và chi phí từng buổi tập. Lệch do liên hoan/mua đồ riêng là bình thường.'}</div>
      </div>`));
    }



    setTimeout(() => {
      document.getElementById('fund-month').onchange = (e) => { state.viewMonth = e.target.value || monthKey(); render(); };
    }, 0);
    return wrap;
  }

  // ---------- PAYMENTS MANAGER (ADMIN/R1 ONLY) ----------
  function renderPaymentsMgr(){
    const wrap = el(`<div></div>`);
    if (!canManage()) {
      wrap.appendChild(el(`<div class="bc-card" style="background:#FAECE7; color:#993C1D; font-size:13px; text-align:center;">Bạn không có quyền truy cập tab này.</div>`));
      return wrap;
    }

    const payment = state.settings.payment || {};
    const bankId = payment.bankId || '';
    const accountNo = payment.accountNo || '';
    const accountName = payment.accountName || '';
    const qrUrl = payment.qrUrl || '';
    
    // 1. Phê duyệt trước
    const pendingReqs = (state.paymentRequests || []).filter(r => r.status === 'pending');
    if (pendingReqs.length > 0) {
      const approvalSection = el(`<div class="bc-card" style="margin-bottom: 1rem; border:1px solid #854F0B;">
        <h3 style="font-size:15px; color:#854F0B; margin-bottom:8px;">🔔 Yêu cầu thanh toán chờ duyệt (${pendingReqs.length})</h3>
        <div style="display:flex; flex-direction:column; gap:8px;"></div>
      </div>`);
      const reqListContainer = approvalSection.querySelector('div');
      
      pendingReqs.forEach(r => {
        const reqEl = el(`<div style="border-top:1px solid #F1EFE8; padding-top:8px; margin-top:4px; font-size:13px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <strong>${escapeHtml(r.memberName)}</strong> nộp tiền tháng <strong>${monthLabel(r.month)}</strong>
              <div style="font-size:12px; color:#6b7a73; margin-top:2px;">
                Đã chuyển: <strong style="color:#27500A;">${formatVND(r.paid)}</strong> · 
                Nộp trước: <strong style="color:#27500A;">${formatVND(r.prepaid)}</strong>
              </div>
              ${r.note ? `<div style="font-size:12px; color:#8a877d; font-style:italic;">Ghi chú: ${escapeHtml(r.note)}</div>` : ''}
              <div style="font-size:11px; color:#8a877d;">Ngày gửi: ${formatDate(r.date)}</div>
            </div>
            <div style="display:flex; gap:6px;">
              ${role() !== 'r1' ? `
                <button class="bc-btn small" style="background:#27500A; border-color:#27500A;" id="approve-req-${r.id}">Duyệt</button>
                <button class="bc-btn danger small" id="reject-req-${r.id}">Từ chối</button>
              ` : `<span style="font-size:12px; color:#8a877d; font-style:italic;">Chế độ xem (R1)</span>`}
            </div>
          </div>
        </div>`);
        
        reqListContainer.appendChild(reqEl);
        
        setTimeout(() => {
          document.getElementById(`approve-req-${r.id}`).onclick = async () => {
            const reqOk = await mutatePaymentRequests(latest => {
              const list = Array.isArray(latest) ? latest : [];
              return list.map(x => x.id === r.id ? Object.assign({}, x, { status: 'approved', approvedBy: state.me.name }) : x);
            });
            if (!reqOk) { alert('Lỗi duyệt yêu cầu.'); return; }
            
            await mutatePayments(latest => {
              const updated = Object.assign({}, latest);
              updated[r.memberId] = Object.assign({}, updated[r.memberId] || {});
              updated[r.memberId][r.month] = { paid: (r.paid || 0) + (r.prepaid || 0), prepaid: 0, date: new Date().toISOString().slice(0,10) };
              return updated;
            });
            
            render();
          };
          
          document.getElementById(`reject-req-${r.id}`).onclick = async () => {
            if (!confirm(`Từ chối yêu cầu chuyển khoản của ${r.memberName}?`)) return;
            await mutatePaymentRequests(latest => {
              const list = Array.isArray(latest) ? latest : [];
              return list.map(x => x.id === r.id ? Object.assign({}, x, { status: 'rejected', approvedBy: state.me.name }) : x);
            });
            render();
          };
        }, 0);
      });
      
      wrap.appendChild(approvalSection);
    } else {
      wrap.appendChild(el(`<div class="bc-card" style="margin-bottom: 1rem; color:#6b7a73; font-size:13px; text-align:center;">✨ Không có yêu cầu thanh toán nào chờ duyệt.</div>`));
    }
    // 2. Cấu hình tài khoản nhận tiền
    const isR1 = role() === 'r1';
    const configSection = el(`<div class="bc-card">
      <h3 style="font-size:15px; color:#1B4332; margin-bottom:8px;">Cấu hình tài khoản nhận tiền (VietQR)</h3>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <div>
          <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:4px;">Mã ngân hàng (VietQR - ví dụ: VCB, MB, TCB, ACB,...):</label>
          <input class="bc-input" id="cfg-bank-id" value="${escapeHtml(bankId)}" placeholder="Nhập mã ngân hàng (ví dụ: VCB)" ${isR1 ? 'disabled style="opacity:0.75;"' : ''} />
        </div>
        <div>
          <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:4px;">Số tài khoản ngân hàng:</label>
          <input class="bc-input" id="cfg-account-no" value="${escapeHtml(accountNo)}" placeholder="Nhập số tài khoản" ${isR1 ? 'disabled style="opacity:0.75;"' : ''} />
        </div>
        <div>
          <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:4px;">Họ và tên chủ tài khoản (không dấu):</label>
          <input class="bc-input" id="cfg-account-name" value="${escapeHtml(accountName)}" placeholder="Nhập tên chủ tài khoản" ${isR1 ? 'disabled style="opacity:0.75;"' : ''} />
        </div>
        <div style="border-top:1px dashed #E3E0D6; padding-top:8px; margin-top:4px;">
          <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:4px;">Hoặc tải lên ảnh QR tĩnh (nếu không tạo VietQR động):</label>
          ${qrUrl ? `<img src="${qrUrl}" style="max-width:140px; border-radius:8px; display:block; margin-bottom:6px;" />` : ''}
          <input type="file" accept="image/*" id="cfg-qr-file" style="font-size:12px;" ${isR1 ? 'disabled style="opacity:0.75;"' : ''} />
        </div>
        ${isR1 ? '' : `<button class="bc-btn small" id="cfg-save-btn" style="align-self:flex-start; margin-top:4px;">Lưu cấu hình nhận tiền</button>`}
        <span id="cfg-save-msg" style="font-size:12px; margin-top:2px;"></span>
      </div>
    </div>`);
    
    wrap.appendChild(configSection);
    
    setTimeout(() => {
      const cfgSaveBtn = document.getElementById('cfg-save-btn');
      if (cfgSaveBtn) cfgSaveBtn.onclick = async () => {
        const bankVal = document.getElementById('cfg-bank-id').value.toUpperCase().replace(/\s+/g, '');
        const accountVal = document.getElementById('cfg-account-no').value.trim();
        const nameVal = document.getElementById('cfg-account-name').value.trim();
        const msg = document.getElementById('cfg-save-msg');
        
        cfgSaveBtn.disabled = true;
        msg.style.color = '#6b7a73';
        msg.textContent = 'Đang lưu cấu hình...';
        
        if (!state.settings.payment) state.settings.payment = {};
        state.settings.payment.bankId = bankVal;
        state.settings.payment.accountNo = accountVal;
        state.settings.payment.accountName = nameVal;
        
        const ok = await saveSettings();
        if (ok) {
          msg.style.color = '#27500A';
          msg.textContent = 'Đã lưu cấu hình nhận tiền!';
          setTimeout(() => { render(); }, 1200);
        } else {
          cfgSaveBtn.disabled = false;
          msg.style.color = '#993C1D';
          msg.textContent = 'Lưu cấu hình thất bại.';
        }
      };
      
      const cfgQrFile = document.getElementById('cfg-qr-file');
      if (cfgQrFile) cfgQrFile.onchange = (e) => {
        const f = e.target.files[0]; if (!f) return;
        if (f.size > 1500000) { alert('Chọn ảnh nhẹ hơn ~1.5MB.'); return; }
        const reader = new FileReader();
        reader.onload = async () => {
          if (!state.settings.payment) state.settings.payment = {};
          state.settings.payment.qrUrl = reader.result;
          await saveSettings();
          render();
        };
        reader.readAsDataURL(f);
      };
    }, 0);

    return wrap;
  }

  // ---------- TOURNAMENT ----------
  function renderTournament(){
    const wrap = el(`<div></div>`);
    
    // Khởi tạo state tạm thời cho cấu hình giải đấu
    state.tourSetup = state.tourSetup || {
      name: 'Giải bóng đá ARON Club Cup',
      courtsCount: 2,
      selectedCourts: state.courts.slice(0, 2).map(c => c.id),
      teams: []
    };

    const activeTour = state.tournaments.find(t => t.status === 'playing' || t.status === 'setup');

    function getTeamName(tour, tid) {
      if (tid === 'TBD') return 'Chờ xác định';
      const t = tour.teams.find(x => x.id === tid);
      return t ? t.name : 'Chờ xác định';
    }

    function getTeamPlayersText(tour, tid) {
      if (tid === 'TBD') return '';
      const t = tour.teams.find(x => x.id === tid);
      if (!t) return '';
      return t.memberIds.map(mid => {
        const m = state.members.find(x => x.id === mid);
        return m ? m.name : '';
      }).filter(Boolean).join(', ');
    }

    if (!activeTour) {
      // ---------------- SETUP MODE ----------------
      if (!canManage()) {
        wrap.appendChild(el(`<div class="bc-empty">Hiện tại không có giải đấu nào đang diễn ra. Vui lòng quay lại sau!</div>`));
        return wrap;
      }

      const activeMembers = state.members.filter(m => m.status === 'active');
      const setupForm = el(`<div class="bc-card">
        <h2 style="font-size:18px; color:#1B4332; font-weight:600; margin-bottom:15px; font-family:'Oswald', sans-serif;">🏆 THIẾT LẬP GIẢI ĐẤU BÓNG ĐÁ MỚI</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div>
            <label style="font-size:13px; font-weight:600; color:#1B4332; display:block; margin-bottom:4px;">Tên giải đấu</label>
            <input class="bc-input" id="tour-setup-name" value="${escapeHtml(state.tourSetup.name)}" placeholder="Ví dụ: Giải Bóng Đá ARON Cup Hè 2026" />
          </div>
          <div style="display:flex; gap:16px; flex-wrap:wrap;">
            <div style="flex:1; min-width:140px;">
              <label style="font-size:13px; font-weight:600; color:#1B4332; display:block; margin-bottom:4px;">Số lượng sân thi đấu tối đa</label>
              <select class="bc-select" id="tour-setup-courts-count">
                <option value="1" ${state.tourSetup.courtsCount === 1 ? 'selected' : ''}>1 Sân</option>
                <option value="2" ${state.tourSetup.courtsCount === 2 ? 'selected' : ''}>2 Sân</option>
                <option value="3" ${state.tourSetup.courtsCount === 3 ? 'selected' : ''}>3 Sân</option>
              </select>
            </div>
            <div style="flex:2; min-width:200px;">
              <label style="font-size:13px; font-weight:600; color:#1B4332; display:block; margin-bottom:4px;">Chọn sân thi đấu</label>
              <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:6px;">
                ${state.courts.map(c => {
                  const checked = state.tourSetup.selectedCourts.includes(c.id) ? 'checked' : '';
                  return `<label style="display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--text-primary);">
                    <input type="checkbox" class="tour-setup-court-chk" value="${c.id}" ${checked} /> ${escapeHtml(c.name)}
                  </label>`;
                }).join(' ')}
                ${state.courts.length === 0 ? '<span style="font-size:12px; color:#993C1D;">(Chưa cấu hình sân đấu ở tab Sân bóng)</span>' : ''}
              </div>
            </div>
          </div>
        </div>
      </div>`);
      wrap.appendChild(setupForm);

      // Card Đăng ký đội bóng
      const teamsCard = el(`<div class="bc-card" style="margin-top:12px;">
        <h3 style="font-size:15px; color:#1B4332; margin-bottom:10px; font-family:'Oswald', sans-serif;">👥 ĐĂNG KÝ ĐỘI BÓNG</h3>
        
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px;">
          <div>
            <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:2px;">Tên đội bóng</label>
            <input class="bc-input" id="team-setup-name-input" placeholder="Ví dụ: FC ARON A" />
          </div>
          <div>
            <label style="font-size:12px; color:#8a877d; display:block; margin-bottom:2px;">Chọn cầu thủ vào đội</label>
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:6px; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.02); border:1px solid #E3E0D6; border-radius:8px; padding:8px;" id="team-players-select-list">
              ${activeMembers.map(m => {
                const pos = m.positions ? m.positions.join('/') : '';
                return `<label style="display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text-primary);">
                  <input type="checkbox" class="team-setup-player-chk" value="${m.id}" /> ${escapeHtml(m.name)} <span style="color:#0C447C; font-size:9px;">(${pos})</span>
                </label>`;
              }).join('')}
            </div>
          </div>
          <button class="bc-btn small" id="tour-add-team-btn" style="height:32px; align-self:flex-end;">Thêm đội bóng</button>

        </div>
      </div>`);

        <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:10px;">⚔️ KHỞI TRANH</h3>
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <div style="font-size:13px; color:#6b7a73;">Số lượng bảng đấu:</div>
          <select class="bc-select" id="tour-setup-groups-count" style="width:120px; padding:4px 6px;">
            <option value="1">1 Bảng (4-6đ)</option>
            <option value="2">2 Bảng (6-10đ)</option>
            <option value="4">4 Bảng (11-18đ)</option>
          </select>
          <span style="font-size:11px; color:#8a877d; font-style:italic; max-width:250px;">(Hệ thống tự động xếp lịch đấu vòng bảng và nhánh đấu knockout)</span>
          <button class="bc-btn" id="tour-start-btn" style="margin-left:auto;">Bắt đầu giải đấu 🚀</button>
        </div>
      </div>`);
      wrap.appendChild(startCard);

      // Event handlers for setup mode
      setTimeout(() => {
        const nameInput = document.getElementById('tour-setup-name');
        if (nameInput) nameInput.oninput = (e) => { state.tourSetup.name = e.target.value; };
        
        const countSelect = document.getElementById('tour-setup-courts-count');
        if (countSelect) countSelect.onchange = (e) => { state.tourSetup.courtsCount = parseInt(e.target.value, 10); };

          teamsContainer.innerHTML = '';

          state.tourSetup.teams.forEach((t, idx) => {

              const m = state.members.find(x => x.id === mid);
              return m ? m.name : '';
            }).filter(Boolean).join(', ');
            
            const row = el(`<div style="display:flex; justify-content:space-between; align-items:flex-start; background:#FFF; border:1px solid #E3E0D6; padding:6px 12px; border-radius:6px; font-size:13px; gap:8px;">

                <div style="font-weight:600; color:#1B4332;">🔵 ${escapeHtml(t.name)}</div>
                <div style="font-size:11px; color:#8a877d; margin-top:2px;">Cầu thủ: ${escapeHtml(playerNames || 'Chưa chọn')}</div>

          });

        renderSetupTeams();

          addTeamBtn.onclick = () => {
            const tName = document.getElementById('team-setup-name-input').value.trim();
            if (!tName) { alert('Nhập tên đội bóng.'); return; }
            
            const selectedPids = Array.from(document.querySelectorAll('.team-setup-player-chk:checked')).map(el => el.value);
            if (selectedPids.length === 0) { alert('Chọn ít nhất 1 cầu thủ vào đội.'); return; }

            state.tourSetup.teams.push({
              id: uid(),
              name: tName,
              memberIds: selectedPids
            });

            // Reset inputs
            document.getElementById('team-setup-name-input').value = '';
            document.querySelectorAll('.team-setup-player-chk').forEach(chk => chk.checked = false);
            renderSetupTeams();
          };
        }

        const startBtn = document.getElementById('tour-start-btn');
        if (startBtn) {
          startBtn.onclick = async () => {
            const name = state.tourSetup.name.trim();
            if (!name) { alert('Nhập tên giải đấu.'); return; }
            if (state.tourSetup.teams.length < 4) { alert('Cần ít nhất 4 đội để bắt đầu giải đấu.'); return; }
            if (state.tourSetup.selectedCourts.length === 0) { alert('Chọn ít nhất 1 sân.'); return; }
            
            const groupsCount = parseInt(document.getElementById('tour-setup-groups-count').value, 10);
            const groups = {};
            const matches = [];

            // Chia bảng
            const groupLetters = groupsCount === 1 ? ['A'] : (groupsCount === 2 ? ['A', 'B'] : ['A', 'B', 'C', 'D']);
            groupLetters.forEach(l => groups[l] = []);

            const shuffledTeams = state.tourSetup.teams.slice().sort(() => Math.random() - 0.5);
            shuffledTeams.forEach((t, idx) => {
              const l = groupLetters[idx % groupLetters.length];
              groups[l].push(t.id);
            });

            // Tạo các trận đấu vòng tròn cho từng bảng
            groupLetters.forEach(l => {
              const gTeams = groups[l];
              for (let i = 0; i < gTeams.length; i++) {
                for (let j = i + 1; j < gTeams.length; j++) {
                  matches.push({
                    id: uid(),
                    stage: 'group',
                    groupName: l,
                    team1Id: gTeams[i],
                    team2Id: gTeams[j],
                    score1: null,
                    score2: null,
                    courtId: null,
                    status: 'waiting'
                  });
                }
              }
            });

            const newTour = {
              id: uid(),
              name,
              status: 'playing',
              courtIds: state.tourSetup.selectedCourts.slice(0, state.tourSetup.courtsCount),
              teams: state.tourSetup.teams,
              groupsCount,
              groups,
              matches
            };

            // Phân phối trận đấu ban đầu lên sân trống
            const availableCourts = newTour.courtIds.slice();
            let idx = 0;
            while (availableCourts.length > 0 && idx < newTour.matches.length) {
              const m = newTour.matches[idx];
              if (m.status === 'waiting') {
                m.courtId = availableCourts.shift();
                m.status = 'playing';
              }
              idx++;
            }

            const ok = await mutateTournaments(latest => latest.concat([newTour]));
            if (ok) {
              alert('Giải đấu bóng đá đã chính thức khởi tranh!');
              render();
            } else {
              alert('Lỗi lưu trữ dữ liệu giải đấu.');
            }
          };
        }
      }, 0);
      return wrap;
    }

    // ---------------- PLAYING MODE ----------------
    // Xác định bảng đấu đang xem. Mặc định là bảng đầu tiên
    const activeGroupKeys = Object.keys(activeTour.groups || {});
    state.viewTourGroup = state.viewTourGroup || activeGroupKeys[0];
    const curGroup = state.viewTourGroup;

    const header = el(`<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:8px;">
      <div>
        <h2 style="font-size:18px; color:#1B4332; font-weight:600; font-family:'Oswald', sans-serif;">🏆 ${escapeHtml(activeTour.name)}</h2>
        <span class="bc-badge" style="background:#EAF3DE; color:#27500A; font-weight:600; font-size:11px; margin-top:2px;">🔥 ĐANG THI ĐẤU</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        ${activeGroupKeys.length > 1 ? `
          <select class="bc-select" id="tour-group-selector" style="width:130px; padding:5px 8px; font-size:13px; font-weight:500;">
            ${activeGroupKeys.map(g => `<option value="${g}" ${g===curGroup?'selected':''}>Bảng ${g}</option>`).join('')}
          </select>` : ''
        }
        ${canManage() ? `<button class="bc-btn danger small" id="tour-cancel-btn">Hủy giải</button>` : ''}
      </div>
    </div>`);
    wrap.appendChild(header);

    setTimeout(() => {
      const groupSelector = document.getElementById('tour-group-selector');
      if (groupSelector) groupSelector.onchange = (e) => { state.viewTourGroup = e.target.value; render(); };

      const cancelBtn = document.getElementById('tour-cancel-btn');
      if (cancelBtn) {
        cancelBtn.onclick = async () => {
          if (!confirm('Bạn có chắc chắn muốn hủy giải đấu này? Mọi lịch đấu và bảng xếp hạng hiện tại sẽ bị xóa sạch.')) return;
          const ok = await mutateTournaments(latest => latest.filter(t => t.id !== activeTour.id));
          if (ok) {
            alert('Đã hủy giải đấu.');
            render();
          }
        };
      }
    }, 0);

    // --- PHẦN 1: TRỰC TIẾP CÁC SÂN ĐẤU ---
    const courtsPanel = el(`<div class="bc-card">
      <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:12px; display:flex; align-items:center; gap:6px;">📺 TRỰC TIẾP CÁC SÂN ĐẤU</h3>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:12px;" id="tour-live-courts"></div>
    </div>`);
    wrap.appendChild(courtsPanel);

    const courtsContainer = courtsPanel.querySelector('#tour-live-courts');
    activeTour.courtIds.forEach(cid => {
      const courtObj = state.courts.find(c => c.id === cid);
      const courtName = courtObj ? courtObj.name : 'Sân đấu';
      const m = activeTour.matches.find(match => match.courtId === cid && match.status === 'playing');

      let courtBoxHtml = '';
      if (m) {
        const titleText = m.stage === 'group' ? `Bảng ${m.groupName}` : m.roundLabel;
        courtBoxHtml = `<div class="bc-card" style="margin:0; padding:12px; border:1px solid #40916C; background:rgba(64,145,108,0.03); display:flex; flex-direction:column; justify-content:space-between; height:100%; min-height:140px;">
          <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <span style="font-weight:700; color:#1B4332; font-size:14px;">📍 ${escapeHtml(courtName)}</span>
              <span class="bc-badge" style="background:#E6F1FB; color:#0C447C; font-size:10px;">${titleText}</span>
            </div>
            <div style="font-size:13px; font-weight:600; color:#2C2C2A; line-height:1.4; margin-bottom:8px;">
              <div style="color:#1b4074;" title="${escapeHtml(getTeamPlayersText(activeTour, m.team1Id))}">🔵 ${escapeHtml(getTeamName(activeTour, m.team1Id))}</div>
              <div style="color:#F26419; margin-top:2px;" title="${escapeHtml(getTeamPlayersText(activeTour, m.team2Id))}">🔴 ${escapeHtml(getTeamName(activeTour, m.team2Id))}</div>
            </div>
          </div>
          ${canManage() 
            ? `<div style="display:flex; gap:4px; align-items:center; border-top:1px dashed rgba(64,145,108,0.2); padding-top:8px;">
                <input class="bc-input" type="number" min="0" id="score-p1-${m.id}" placeholder="🔵" style="width:45px; padding:4px; text-align:center; height:26px; font-size:12px;" />
                <span style="font-size:12px; color:#8a877d;">-</span>
                <input class="bc-input" type="number" min="0" id="score-p2-${m.id}" placeholder="🔴" style="width:45px; padding:4px; text-align:center; height:26px; font-size:12px;" />
                <button class="bc-btn small" id="save-score-btn-${m.id}" style="padding:4px 8px; font-size:11px; margin-left:auto; background:#27500A; border-color:#27500A;">Lưu</button>
               </div>`
            : `<div style="font-size:11px; color:#8a877d; font-style:italic; border-top:1px dashed rgba(64,145,108,0.2); padding-top:6px;">Đang đá...</div>`
          }
        </div>`;
      } else {
        courtBoxHtml = `<div class="bc-card" style="margin:0; padding:12px; border:1px dashed #D8D4C6; background:#FFF; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:140px; text-align:center; color:#8a877d; font-style:italic; font-size:13px;">
          <div>📍 ${escapeHtml(courtName)}</div>
          <div style="font-size:12px; margin-top:6px; color:#b0aca2;">Sân trống. Chờ trận đấu tiếp theo...</div>
        </div>`;
      }
      
      const courtBox = el(courtBoxHtml);
      courtsContainer.appendChild(courtBox);

      // Lưu kết quả cho Admin
      if (m && canManage()) {
        setTimeout(() => {
          const saveBtn = document.getElementById(`save-score-btn-${m.id}`);
          if (saveBtn) {
            saveBtn.onclick = async () => {
              const sc1Str = document.getElementById(`score-p1-${m.id}`).value;
              const sc2Str = document.getElementById(`score-p2-${m.id}`).value;
              
              if (sc1Str === '' || sc2Str === '') { alert('Vui lòng nhập đầy đủ tỷ số.'); return; }
              const sc1 = parseInt(sc1Str, 10);
              const sc2 = parseInt(sc2Str, 10);
              
              if (m.stage === 'knockout' && sc1 === sc2) {
                const pWinner = prompt(`Trận Knockout không thể có tỷ số Hòa. Hãy xác định đội đi tiếp!\nNhập '1' nếu ${getTeamName(activeTour, m.team1Id)} thắng luân lưu.\nNhập '2' nếu ${getTeamName(activeTour, m.team2Id)} thắng luân lưu.`);
                if (pWinner !== '1' && pWinner !== '2') {
                  alert('Lựa chọn không hợp lệ, vui lòng nhập lại điểm và chọn đội thắng.');
                  return;
                }
                m.penaltyWinner = pWinner === '1' ? m.team1Id : m.team2Id;
              }

              const ok = await mutateTournaments(latest => {
                const tour = latest.find(t => t.id === activeTour.id);
                if (!tour) return null;
                const matchObj = tour.matches.find(x => x.id === m.id);
                if (!matchObj) return null;
                
                matchObj.score1 = sc1;
                matchObj.score2 = sc2;
                matchObj.status = 'done';
                if (m.penaltyWinner) matchObj.penaltyWinner = m.penaltyWinner;

                // Gán trận tiếp theo vào sân
                const nextMatch = tour.matches.find(x => x.status === 'waiting');
                if (nextMatch) {
                  nextMatch.courtId = cid;
                  nextMatch.status = 'playing';
                }
                return latest;
              });
              if (ok) render();
            };
          }
        }, 0);
      }
    });

    // --- PHẦN 2: HÀNG CHỜ TRẬN ĐẤU ---
    const waitingMatches = activeTour.matches.filter(m => m.status === 'waiting');
    const queueCard = el(`<div class="bc-card" style="margin-top:12px;">
      <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:8px;">⏳ HÀNG CHỜ TRẬN ĐẤU (${waitingMatches.length})</h3>
      <div style="display:flex; flex-direction:column; gap:8px; max-height:200px; overflow-y:auto;" id="tour-match-queue"></div>
    </div>`);
    wrap.appendChild(queueCard);

    const queueContainer = queueCard.querySelector('#tour-match-queue');
    if (waitingMatches.length === 0) {
      queueContainer.appendChild(el(`<div style="font-size:12px; color:#8a877d; font-style:italic; text-align:center; padding:12px;">Không có trận đấu nào trong hàng chờ.</div>`));
    } else {
      waitingMatches.forEach((m, idx) => {
        const titleText = m.stage === 'group' ? `Bảng ${m.groupName}` : m.roundLabel;
        const row = el(`<div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.01); border:1px solid #E3E0D6; padding:6px 12px; border-radius:6px; font-size:12px;">
          <div>
            <span style="font-weight:600; color:#1B4332;">${escapeHtml(getTeamName(activeTour, m.team1Id))}</span>
            <span style="color:#8a877d; margin:0 4px;">vs</span>
            <span style="font-weight:600; color:#1B4332;">${escapeHtml(getTeamName(activeTour, m.team2Id))}</span>
          </div>
          <span class="bc-badge" style="background:#F1EFE8; color:#444441; font-size:10px; font-weight:600;">#${idx+1} · ${titleText}</span>
        </div>`);
        queueContainer.appendChild(row);
      });
    }

    // --- PHẦN 3: BẢNG XẾP HẠNG VÒNG BẢNG ---
    const groupKeys = Object.keys(activeTour.groups || {});
    if (groupKeys.length > 0 && activeTour.matches.some(m => m.stage === 'group')) {
      const standingsCard = el(`<div class="bc-card" style="margin-top:12px;">
        <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:12px;">📊 BẢNG XẾP HẠNG VÒNG BẢNG</h3>
        <div style="display:flex; flex-direction:column; gap:16px;" id="tour-standings"></div>
      </div>`);
      wrap.appendChild(standingsCard);

      const standingsContainer = standingsCard.querySelector('#tour-standings');
      const l = curGroup;
      if (activeTour.groups[l]) {
        const groupTeams = activeTour.groups[l];
        
        const teamStats = groupTeams.map(tid => {
          const stats = { tid, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
          const gMatches = activeTour.matches.filter(m => m.stage === 'group' && m.groupName === l && m.status === 'done' && (m.team1Id === tid || m.team2Id === tid));
          
          gMatches.forEach(m => {
            stats.played++;
            const isT1 = m.team1Id === tid;
            const myScore = isT1 ? m.score1 : m.score2;
            const oppScore = isT1 ? m.score2 : m.score1;
            
            stats.gf += myScore;
            stats.ga += oppScore;
            stats.gd += (myScore - oppScore);
            
            if (myScore > oppScore) {
              stats.won++;
              stats.pts += 3;
            } else if (myScore < oppScore) {
              stats.lost++;
            } else {
              stats.drawn++;
              stats.pts += 1;
            }
          });
          return stats;
        });

        teamStats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

        const groupTbl = el(`<div style="background:#FFF; border:1px solid #E3E0D6; border-radius:10px; padding:10px; overflow-x:auto;">
          <div style="font-weight:700; color:#1B4332; font-size:13px; margin-bottom:8px; display:flex; align-items:center; gap:6px;">🌐 BẢNG THI ĐẤU ${l}</div>
          <table style="width:100%; font-size:12px; border-collapse:collapse; min-width:340px;">
            <tr style="color:#8a877d; border-bottom:1px solid #EFEDE3; text-align:left;">
              <th style="padding:4px;">Hạng</th>
              <th style="padding:4px;">Đội bóng</th>
              <th style="padding:4px; text-align:center;">Trận</th>
              <th style="padding:4px; text-align:center;">T-H-B</th>
              <th style="padding:4px; text-align:center;">Bàn thắng/bại</th>
              <th style="padding:4px; text-align:center;">Hiệu số</th>
              <th style="padding:4px; text-align:right;">Điểm</th>
            </tr>
          </table>
        </div>`);
        
        const table = groupTbl.querySelector('table');
        teamStats.forEach((st, idx) => {
          const row = el(`<tr style="border-bottom:1px solid #F8F9FA;">
            <td style="padding:6px 4px; font-weight:600; color:${idx<2?'#27500A':'#8a877d'};">${idx+1}</td>
            <td style="padding:6px 4px; font-weight:500;" title="${escapeHtml(getTeamPlayersText(activeTour, st.tid))}">🔵 ${escapeHtml(getTeamName(activeTour, st.tid))}</td>
            <td style="padding:6px 4px; text-align:center;">${st.played}</td>
            <td style="padding:6px 4px; text-align:center;">${st.won}-${st.drawn}-${st.lost}</td>
            <td style="padding:6px 4px; text-align:center;">${st.gf}/${st.ga}</td>
            <td style="padding:6px 4px; text-align:center; color:${st.gd>=0?'#27500A':'#993C1D'};">${st.gd > 0 ? '+' : ''}${st.gd}</td>
            <td style="padding:6px 4px; text-align:right; font-weight:700; color:#1B4332;">${st.pts}</td>
          </tr>`);
          table.appendChild(row);
        });
        standingsContainer.appendChild(groupTbl);
      }
    }

    // --- PHẦN 4: NHÁNH ĐẤU LOẠI TRỰC TIẾP ---
    const koMatches = activeTour.matches.filter(m => m.stage === 'knockout');
    const groupMatchesFinished = activeTour.matches.filter(m => m.stage === 'group').every(m => m.status === 'done');

    const bracketCard = el(`<div class="bc-card" style="margin-top:12px;">
      <h3 style="font-size:15px; color:#1B4332; font-family:'Oswald', sans-serif; margin-bottom:12px;">🌳 NHÁNH ĐẤU LOẠI TRỰC TIẾP</h3>
      <div id="tour-bracket-area"></div>
    </div>`);
    wrap.appendChild(bracketCard);

    const bracketArea = bracketCard.querySelector('#tour-bracket-area');
    if (koMatches.length === 0) {
      bracketArea.appendChild(el(`<div style="text-align:center; padding:15px; color:#8a877d; font-size:12px; font-style:italic;">
        Đang ở giai đoạn vòng bảng. ${groupMatchesFinished && canManage() ? 'Bấm chốt vòng bảng bên dưới để bắt đầu xếp sơ đồ đấu trực tiếp.' : 'Nhánh đấu loại trực tiếp sẽ xuất hiện sau khi vòng bảng kết thúc.'}
      </div>`));

      if (groupMatchesFinished && canManage()) {
        const advanceBtn = el(`<button class="bc-btn" style="width:100%; margin-top:10px; background:#1B4332;">Kết Thúc Vòng Bảng & Xếp Nhánh Đấu Trực Tiếp 🚀</button>`);
        advanceBtn.onclick = async () => {
          const groupResults = {};
          groupKeys.forEach(l => {
            const groupTeams = activeTour.groups[l];
            const teamStats = groupTeams.map(tid => {
              const stats = { tid, pts: 0, gd: 0, gf: 0 };
              const gMatches = activeTour.matches.filter(m => m.stage === 'group' && m.groupName === l && (m.team1Id === tid || m.team2Id === tid));
              gMatches.forEach(m => {
                const isT1 = m.team1Id === tid;
                const myScore = isT1 ? m.score1 : m.score2;
                const oppScore = isT1 ? m.score2 : m.score1;
                stats.gf += myScore;
                stats.gd += (myScore - oppScore);
                if (myScore > oppScore) stats.pts += 3;
                else if (myScore === oppScore) stats.pts += 1;
              });
              return stats;
            });
            teamStats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
            groupResults[l] = teamStats.map(x => x.tid);
          });

          const newKoMatches = [];
          if (groupKeys.length === 4) {
            newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Tứ Kết', team1Id: groupResults['A'][0], team2Id: groupResults['B'][1], score1: null, score2: null, courtId: null, status: 'waiting' });
            newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Tứ Kết', team1Id: groupResults['C'][0], team2Id: groupResults['D'][1], score1: null, score2: null, courtId: null, status: 'waiting' });
            newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Tứ Kết', team1Id: groupResults['B'][0], team2Id: groupResults['A'][1], score1: null, score2: null, courtId: null, status: 'waiting' });
            newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Tứ Kết', team1Id: groupResults['D'][0], team2Id: groupResults['C'][1], score1: null, score2: null, courtId: null, status: 'waiting' });
          } else if (groupKeys.length === 2) {
            newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Bán Kết', team1Id: groupResults['A'][0], team2Id: groupResults['B'][1], score1: null, score2: null, courtId: null, status: 'waiting' });
            newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Bán Kết', team1Id: groupResults['B'][0], team2Id: groupResults['A'][1], score1: null, score2: null, courtId: null, status: 'waiting' });
          } else {
            const sortedGroup = groupResults['A'] || [];
            if (sortedGroup.length >= 4) {
              newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Bán Kết', team1Id: sortedGroup[0], team2Id: sortedGroup[3], score1: null, score2: null, courtId: null, status: 'waiting' });
              newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Bán Kết', team1Id: sortedGroup[1], team2Id: sortedGroup[2], score1: null, score2: null, courtId: null, status: 'waiting' });
            } else {
              newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Chung Kết', team1Id: sortedGroup[0] || 'TBD', team2Id: sortedGroup[1] || 'TBD', score1: null, score2: null, courtId: null, status: 'waiting' });
              if (sortedGroup[2]) {
                newKoMatches.push({ id: uid(), stage: 'knockout', roundLabel: 'Tranh hạng 3', team1Id: sortedGroup[2], team2Id: sortedGroup[3] || 'TBD', score1: null, score2: null, courtId: null, status: 'waiting' });
              }
            }
          }

          const ok = await mutateTournaments(latest => {
            const tour = latest.find(t => t.id === activeTour.id);
            if (!tour) return null;
            tour.matches = tour.matches.concat(newKoMatches);
            
            const emptyCourts = tour.courtIds.filter(cid => !tour.matches.some(m => m.courtId === cid && m.status === 'playing'));
            emptyCourts.forEach(cid => {
              const nextM = tour.matches.find(x => x.status === 'waiting');
              if (nextM) { nextM.courtId = cid; nextM.status = 'playing'; }
            });
            return latest;
          });
          if (ok) render();
        };
        bracketArea.appendChild(advanceBtn);
      }
    } else {
      const qfMatches = koMatches.filter(m => m.roundLabel === 'Tứ Kết');
      const sfMatches = koMatches.filter(m => m.roundLabel === 'Bán Kết');
      const fMatches = koMatches.filter(m => m.roundLabel === 'Chung Kết');
      const thirdMatches = koMatches.filter(m => m.roundLabel === 'Tranh hạng 3');

      const qfFinished = qfMatches.length === 0 || qfMatches.every(m => m.status === 'done');
      const sfFinished = sfMatches.length > 0 && sfMatches.every(m => m.status === 'done');
      const fFinished = fMatches.length > 0 && fMatches.every(m => m.status === 'done');

      const tree = el(`<div style="display:flex; gap:16px; align-items:center; overflow-x:auto; padding:10px 0;"></div>`);
      
      function renderBracketMatchBox(m) {
        const sc1 = m.score1 !== null ? m.score1 : '-';
        const sc2 = m.score2 !== null ? m.score2 : '-';
        let courtBadge = '';
        if (m.status === 'playing') {
          const cObj = state.courts.find(c => c.id === m.courtId);
          courtBadge = `<span style="font-size:9px; background:#EAF3DE; color:#27500A; padding:1px 4px; border-radius:3px; font-weight:700;">LIVE: ${cObj ? cObj.name : 'Sân'}</span>`;
        }
        
        let isT1Winner = false;
        let isT2Winner = false;
        if (m.status === 'done') {
          if (m.score1 > m.score2) isT1Winner = true;
          else if (m.score2 > m.score1) isT2Winner = true;
          else if (m.penaltyWinner === m.team1Id) isT1Winner = true;
          else if (m.penaltyWinner === m.team2Id) isT2Winner = true;
        }

        const t1PenHtml = (m.status === 'done' && m.score1 === m.score2 && m.penaltyWinner === m.team1Id) ? ' (Pen)' : '';
        const t2PenHtml = (m.status === 'done' && m.score1 === m.score2 && m.penaltyWinner === m.team2Id) ? ' (Pen)' : '';

        return `<div style="background:#FFF; border:1px solid ${m.status==='done'?'#E3E0D6':'#40916C'}; border-radius:8px; padding:8px; min-width:180px; box-shadow:0 3px 6px rgba(0,0,0,0.03); display:flex; flex-direction:column; gap:4px;">
          <div style="font-size:10px; color:#8a877d; font-weight:600; display:flex; justify-content:space-between; align-items:center;">
            <span>${m.roundLabel}</span>
            ${courtBadge}
          </div>
          <div style="font-size:12px; display:flex; justify-content:space-between; font-weight:500; color:${isT1Winner ? '#27500A':'#2C2C2A'};">
            <span>${escapeHtml(getTeamName(activeTour, m.team1Id))}${t1PenHtml}</span>
            <span style="font-weight:700;">${sc1}</span>
          </div>
          <div style="font-size:12px; display:flex; justify-content:space-between; font-weight:500; color:${isT2Winner ? '#27500A':'#2C2C2A'};">
            <span>${escapeHtml(getTeamName(activeTour, m.team2Id))}${t2PenHtml}</span>
            <span style="font-weight:700;">${sc2}</span>
          </div>
        </div>`;
      }

      if (qfMatches.length > 0) {
        const col = el(`<div style="display:flex; flex-direction:column; gap:20px; justify-content:space-around;"></div>`);
        qfMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        tree.appendChild(col);
      }

      if (sfMatches.length > 0) {
        const col = el(`<div style="display:flex; flex-direction:column; gap:40px; justify-content:space-around;"></div>`);
        sfMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        tree.appendChild(col);
      }

      if (fMatches.length > 0) {
        const col = el(`<div style="display:flex; flex-direction:column; gap:20px; justify-content:center;"></div>`);
        fMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        thirdMatches.forEach(m => col.appendChild(el(renderBracketMatchBox(m))));
        tree.appendChild(col);
      }

      bracketArea.appendChild(tree);

      if (canManage()) {
        const btnBox = el(`<div style="margin-top:12px; border-top:1px dashed #E3E0D6; padding-top:10px;"></div>`);
        
        const getWinnerId = (m) => {
          if (m.score1 > m.score2) return m.team1Id;
          if (m.score2 > m.score1) return m.team2Id;
          return m.penaltyWinner;
        };

        const getLoserId = (m) => {
          if (m.score1 > m.score2) return m.team2Id;
          if (m.score2 > m.score1) return m.team1Id;
          return m.penaltyWinner === m.team1Id ? m.team2Id : m.team1Id;
        };

        if (qfMatches.length > 0 && qfFinished && sfMatches.length === 0) {
          const nextBtn = el(`<button class="bc-btn" style="width:100%;">Tạo Vòng Bán Kết 🚀</button>`);
          nextBtn.onclick = async () => {
            const w = qfMatches.map(m => getWinnerId(m));
            const newSf = [
              { id: uid(), stage: 'knockout', roundLabel: 'Bán Kết', team1Id: w[0], team2Id: w[1], score1: null, score2: null, courtId: null, status: 'waiting' },
              { id: uid(), stage: 'knockout', roundLabel: 'Bán Kết', team1Id: w[2], team2Id: w[3], score1: null, score2: null, courtId: null, status: 'waiting' }
            ];
            
            const ok = await mutateTournaments(latest => {
              const tour = latest.find(t => t.id === activeTour.id);
              if (!tour) return null;
              tour.matches = tour.matches.concat(newSf);
              
              const emptyCourts = tour.courtIds.filter(cid => !tour.matches.some(x => x.courtId === cid && x.status === 'playing'));
              emptyCourts.forEach(cid => {
                const nextM = tour.matches.find(x => x.status === 'waiting');
                if (nextM) { nextM.courtId = cid; nextM.status = 'playing'; }
              });
              return latest;
            });
            if (ok) render();
          };
          btnBox.appendChild(nextBtn);
        } else if (sfFinished && fMatches.length === 0) {
          const nextBtn = el(`<button class="bc-btn" style="width:100%;">Tạo Vòng Chung Kết & Tranh Hạng 3 🚀</button>`);
          nextBtn.onclick = async () => {
            const w = sfMatches.map(m => getWinnerId(m));
            const l = sfMatches.map(m => getLoserId(m));
            
            const newF = [
              { id: uid(), stage: 'knockout', roundLabel: 'Chung Kết', team1Id: w[0], team2Id: w[1], score1: null, score2: null, courtId: null, status: 'waiting' },
              { id: uid(), stage: 'knockout', roundLabel: 'Tranh hạng 3', team1Id: l[0], team2Id: l[1], score1: null, score2: null, courtId: null, status: 'waiting' }
            ];

            const ok = await mutateTournaments(latest => {
              const tour = latest.find(t => t.id === activeTour.id);
              if (!tour) return null;
              tour.matches = tour.matches.concat(newF);
              
              // Gán sân trống tự động
              const emptyCourts = tour.courtIds.filter(cid => !tour.matches.some(x => x.courtId === cid && x.status === 'playing'));
              emptyCourts.forEach(cid => {
                const nextM = tour.matches.find(x => x.status === 'waiting');
                if (nextM) { nextM.courtId = cid; nextM.status = 'playing'; }
              });
              return latest;
            });
            if (ok) render();
          };
          btnBox.appendChild(nextBtn);
        } else if (fFinished) {
          const endBtn = el(`<button class="bc-btn" style="width:100%; background:#27500A; border-color:#27500A;">Bế Mạc & Trao Giải 🏆</button>`);
          endBtn.onclick = async () => {
            if (!confirm('Bạn có chắc chắn muốn kết thúc giải đấu? Dữ liệu giải đấu sẽ được lưu trữ và bế mạc.')) return;
            const ok = await mutateTournaments(latest => {
              const tour = latest.find(t => t.id === activeTour.id);
              if (!tour) return null;
              tour.status = 'finished';
              return latest;
            });
            if (ok) {
              alert('Bế mạc giải đấu thành công! Xin chúc mừng các đội đạt giải.');
              render();
            }
          };
          btnBox.appendChild(endBtn);
        }
        if (btnBox.children.length > 0) bracketCard.appendChild(btnBox);
      }
    }

    // --- HIỂN THỊ KẾT QUẢ PODIUM NẾU GIẢI ĐÃ KẾT THÚC ---
    const finishedTours = state.tournaments.filter(t => t.status === 'finished');
    if (finishedTours.length > 0) {
      finishedTours.forEach(t => {
        const podiumCard = el(`<div class="bc-card" style="margin-top:16px; border:2px solid #D8973C; background:linear-gradient(135deg, rgba(254, 252, 243, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);">
          <h2 style="font-size:16px; color:#1B4332; font-weight:600; text-align:center; font-family:'Oswald', sans-serif; margin-bottom:12px;">🏆 KẾT QUẢ GIẢI ĐẤU: ${escapeHtml(t.name)}</h2>
          <div style="display:flex; flex-direction:column; gap:10px;" id="podium-cats-${t.id}"></div>
        </div>`);
        
        const podiumContainer = podiumCard.querySelector(`#podium-cats-${t.id}`);
        const finalMatch = t.matches.find(m => m.roundLabel === 'Chung Kết' && m.status === 'done');
        const thirdMatch = t.matches.find(m => m.roundLabel === 'Tranh hạng 3' && m.status === 'done');
        
        const getWinnerId = (m) => {
          if (m.score1 > m.score2) return m.team1Id;
          if (m.score2 > m.score1) return m.team2Id;
          return m.penaltyWinner;
        };

        const getLoserId = (m) => {
          if (m.score1 > m.score2) return m.team2Id;
          if (m.score2 > m.score1) return m.team1Id;
          return m.penaltyWinner === m.team1Id ? m.team2Id : m.team1Id;
        };

        if (finalMatch) {
          const goldTeam = getWinnerId(finalMatch);
          const silverTeam = getLoserId(finalMatch);
          let bronzeTeam = '';
          if (thirdMatch) {
            bronzeTeam = getWinnerId(thirdMatch);
          }
          
          const catRow = el(`<div style="border:1px solid #E3E0D6; border-radius:8px; padding:10px; background:#FFF;">
            <div style="display:flex; flex-direction:column; gap:6px; font-size:13px;">
              <div style="font-weight:600; color:#B85C00; display:flex; align-items:center; gap:4px;">👑 Vô địch (Vàng): ${escapeHtml(getTeamName(t, goldTeam))}</div>
              <div style="font-weight:600; color:#495057; display:flex; align-items:center; gap:4px;">⭐ Á quân (Bạc): ${escapeHtml(getTeamName(t, silverTeam))}</div>
              ${bronzeTeam ? `<div style="font-weight:600; color:#854F0B; display:flex; align-items:center; gap:4px;">🥉 Hạng ba (Đồng): ${escapeHtml(getTeamName(t, bronzeTeam))}</div>` : ''}
            </div>
          </div>`);
          podiumContainer.appendChild(catRow);
        }
        wrap.appendChild(podiumCard);
      });
    }

    return wrap;
  }

  function renderTacticsAndFun() {
    const wrap = el(`<div></div>`);
    
    // Khởi tạo trạng thái con và các khóa dữ liệu
    state.tacticsSubTab = state.tacticsSubTab || 'board';
    state.tacticsMode = state.tacticsMode || 'drag'; // 'drag' hoặc 'draw'
    state.settings.fines = state.settings.fines || [];
    state.settings.achievements = state.settings.achievements || [];
    state.settings.badges = state.settings.badges || {};

    const subTabs = el(`<div style="display:flex; gap:8px; margin-bottom:1rem; border-bottom:1px solid #EFEDE3; padding-bottom:8px;">
      <button class="bc-btn ${state.tacticsSubTab==='board'?'primary':'outline'} small" id="tst-board-btn">📋 Sa bàn chiến thuật</button>
      <button class="bc-btn ${state.tacticsSubTab==='fines'?'primary':'outline'} small" id="tst-fines-btn">💰 Quỹ phạt CLB</button>

    wrap.appendChild(subTabs);

    setTimeout(() => {
